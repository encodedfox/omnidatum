# Clippy configuration — see https://doc.rust-lang.org/clippy/configuration.html

# Allow unwrap in test code only
allow-unwrap-in-tests = true

# Raise the threshold for too-many-arguments (repo_from_row takes 13 params)
too-many-arguments-threshold = 15

# Disallow panic-related macros in production code
disallowed-methods = [
    { path = "std::panic", allow-invalid = true },
    { path = "std::todo", allow-invalid = true },
    { path = "std::unreachable", allow-invalid = true },
    { path = "std::unimplemented", allow-invalid = true },
]
